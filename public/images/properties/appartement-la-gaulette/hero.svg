<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0369a1"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="water" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0e7490" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="overlay" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.5)"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#g)"/>
  <!-- Sky glow -->
  <circle cx="300" cy="100" r="200" fill="#7dd3fc" opacity="0.1"/>
  <!-- Lagoon -->
  <ellipse cx="600" cy="480" rx="700" ry="200" fill="url(#water)"/>
  <!-- Waves -->
  <path d="M0 440 Q150 420 300 440 Q450 460 600 440 Q750 420 900 440 Q1050 460 1200 440 L1200 700 L0 700 Z" fill="#0e7490" opacity="0.25"/>
  <path d="M0 470 Q200 450 400 470 Q600 490 800 470 Q1000 450 1200 470 L1200 700 L0 700 Z" fill="#0c4a6e" opacity="0.3"/>
  <!-- Text -->
  <text x="600" y="520" font-family="Georgia, serif" font-size="52" font-weight="700" fill="white" text-anchor="middle" opacity="0.95">Apartment La Gaulette</text>
  <text x="600" y="578" font-family="Arial, sans-serif" font-size="24" fill="white" text-anchor="middle" opacity="0.75">La Gaulette, Black River · Steps from the Lagoon</text>
  <rect width="1200" height="700" fill="url(#overlay)"/>
</svg>
